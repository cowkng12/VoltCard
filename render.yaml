services:
  - type: web
    name: voltcard-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: API_BASE_URL
        value: https://voltcard-web.onrender.com
      - key: BOT_TOKEN
        sync: false
      - key: MINI_APP_URL
        value: https://voltcard-web.onrender.com
